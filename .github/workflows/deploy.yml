name: Deploy to Coolify

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build API Docker image
      run: |
        docker build -t agrof-api ./agrof-main/src/api/
    
    - name: Build Store Docker image
      run: |
        docker build -t agrof-store ./store-backend/
    
    - name: Deploy to Coolify
      if: github.ref == 'refs/heads/main'
      run: |
        echo "🚀 Deployment would happen here via Coolify webhook"
        echo "Services ready for Coolify deployment:"
        echo "  - AGROF API (Python/Flask)"
        echo "  - AGROF Store (Node.js/Express)"